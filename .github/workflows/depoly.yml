name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/devops-mini-project
            git pull origin main
            sudo docker stop devop-app || true
            sudo docker rm devop-app || true
            sudo docker build -t devops-mini-project .
            sudo docker run -d -p 5000:5000 --name devop-app devops-mini-project
